  <text x="446" y="550" fill="#306CFF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">已选高频主题 × 2</text>
  <rect x="660" y="530" width="220" height="28" rx="14" fill="#EAF8F1"/>
  <text x="682" y="550" fill="#0E9F6E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">已选研究不足 × 1</text>
  <rect x="896" y="530" width="220" height="28" rx="14" fill="#FFF5E8"/>
  <text x="918" y="550" fill="#D97706" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">补充真实背景</text>

  <rect x="392" y="602" width="468" height="208" rx="16" fill="#FBFCFE" stroke="#E4E9F1"/>
  <text x="424" y="648" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">AI 推荐搭建顺序</text>
  <text x="424" y="686" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">1. 论文整体提纲</text>
  <text x="424" y="718" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">2. 引言/问题提出</text>
  <text x="424" y="750" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">3. 文献综述提纲</text>
  <rect x="424" y="768" width="188" height="30" rx="15" fill="#306CFF"/>
  <text x="450" y="789" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">采用建议并开始写</text>

  <rect x="896" y="602" width="468" height="208" rx="16" fill="#FBFCFE" stroke="#E4E9F1"/>
  <text x="928" y="648" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">当前论文部分</text>
  <text x="928" y="686" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">论文整体提纲 · paper_outline</text>
  <text x="928" y="718" fill="#0E9F6E" font-family="Segoe UI, Arial, sans-serif" font-size="19">输出类型：结构骨架</text>
  <text x="928" y="750" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">建议先搭清一级结构，再逐段扩写正文。</text>
  <rect x="928" y="768" width="156" height="30" rx="15" fill="#F1F5F9"/>
  <text x="952" y="789" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">编辑并保存</text>

  <defs>
    <linearGradient id="header" x1="36" y1="26" x2="1404" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF4FF"/>
      <stop offset="0.65" stop-color="#F7FAFF"/>
