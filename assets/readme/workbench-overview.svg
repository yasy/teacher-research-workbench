  <text x="95" y="409" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">写作工作台</text>

  <rect x="68" y="446" width="180" height="52" rx="12" fill="#FFFFFF" stroke="#D7E1EE"/>
  <text x="95" y="479" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">润色与导出</text>

  <line x1="68" y1="566" x2="250" y2="566" stroke="#D7E1EE"/>
  <text x="68" y="610" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="18">建议按“选题 → 文献 → 写作 → 导出”完成</text>
  <rect x="68" y="720" width="54" height="54" rx="12" fill="#FFFFFF" stroke="#D7E1EE"/>
  <text x="85" y="754" fill="#1F2937" font-family="Segoe UI Emoji, Segoe UI Symbol, Arial, sans-serif" font-size="26">⚙</text>

  <rect x="352" y="142" width="1052" height="704" rx="18" fill="#FFFFFF" stroke="#E3E8EF"/>
  <text x="392" y="206" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">写作工作台</text>
  <text x="392" y="238" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="19">按论文写作 SOP 搭建整篇草稿，而不是一次性生成全文。</text>

  <rect x="392" y="272" width="972" height="92" rx="16" fill="#F8FBFF" stroke="#D7E1EE"/>
  <text x="424" y="315" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">步骤切换</text>
  <text x="424" y="346" fill="#306CFF" font-family="Segoe UI, Arial, sans-serif" font-size="18">步骤 1：本次写作依据</text>
  <text x="682" y="346" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="18">步骤 2：补充写作材料</text>
  <text x="960" y="346" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="18">步骤 3：选择论文部分</text>

  <rect x="392" y="392" width="972" height="184" rx="16" fill="#FBFCFE" stroke="#E4E9F1"/>
  <text x="424" y="438" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">本次写作采用依据</text>
  <text x="424" y="476" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">来自文献工作台：高频主题、研究不足、可写切入点</text>
  <text x="424" y="510" fill="#526174" font-family="Segoe UI, Arial, sans-serif" font-size="19">来自教师本人：学校/课程/项目背景、真实案例、研究边界</text>
